<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Script Host</title>
    <style>
        /* Menghilangkan semua margin dan padding bawaan browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Mencegah double scrollbar dari halaman pembungkus */
            background-color: #ffffff;
        }

        /* Membuat iframe memenuhi seluruh layar secara absolut */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Iframe yang memuat langsung aplikasi Google Apps Script (GAS) -->
    <iframe 
        src="https://script.google.com/macros/s/AKfycbysW-0ZPDoZg8Mfef0WZlCZiPwHiTrgPQsqmrKk6GOEP_H2ssBpJZEYre7uJ5JDQZwc/exec" 
        allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb" 
        sandbox="allow-forms allow-scripts allow-same-origin allow-popups allow-modals"
    >
        Browser Anda tidak mendukung iframe. Silakan buka tautan secara langsung.
    </iframe>

</body>
</html>
